name: Build APKs (GoDeli + GoRider)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: godeli      # app del cliente (raíz del repo)
            dir: .
          - name: gorider     # app del repartidor
            dir: go_rider_app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: sdkmanager "platforms;android-36" "build-tools;34.0.0"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ matrix.dir }}

      - name: Configurar clave de firma
        id: keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"
          else
            echo "Sin secreto ANDROID_KEYSTORE_BASE64 — se usará firma debug."
          fi

      - name: Build APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release
        working-directory: ${{ matrix.dir }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-apk
          path: ${{ matrix.dir }}/build/app/outputs/flutter-apk/app-release.apk
