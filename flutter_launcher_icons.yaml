flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

  # Android adaptive icon (API 26+): fondo blanco + logo centrado
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

  # iOS: sin fondo adicional, usa el PNG directamente
  remove_alpha_ios: true

  web:
    generate: false
