# Configuración de Edge Functions de Supabase
# Documentación: https://supabase.com/docs/guides/functions/config

[functions.webpay-return]
# Llamada por Transbank (redirect HTTP) — no tiene JWT
verify_jwt = false

[functions.webpay-create]
# Llamada desde la app Flutter (cliente autenticado con JWT)
verify_jwt = true

[functions.webpay-refund]
# Llamada desde panel admin (cliente autenticado con JWT)
verify_jwt = true

[functions.khipu-create]
# Llamada desde la app Flutter (cliente autenticado con JWT)
verify_jwt = true

[functions.khipu-return]
# Llamada por Khipu (redirect HTTP) — no tiene JWT
verify_jwt = false

[functions.khipu-notify]
# Llamada por webhook de Khipu — no tiene JWT
verify_jwt = false

[functions.notify-rider]
# Llamada internamente (trigger DB o admin)
verify_jwt = true

[functions.notify-client]
# Llamada internamente (trigger DB o admin)
verify_jwt = true

[functions.menu-import]
# Llamada desde panel admin (cliente autenticado con JWT)
verify_jwt = true
