<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Deli — Feature Graphic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #333;
  }
  .graphic {
    width: 1024px; height: 500px;
    background: linear-gradient(135deg, #2D1B69 0%, #4A1A8A 30%, #7B2FBE 60%, #FF6B35 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 60px;
    position: relative; overflow: hidden;
  }
  /* Círculos decorativos */
  .graphic::before {
    content: ''; position: absolute;
    width: 500px; height: 500px;
    background: rgba(255,107,53,0.12);
    border-radius: 50%; top: -200px; right: -120px;
  }
  .graphic::after {
    content: ''; position: absolute;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%; bottom: -100px; left: 100px;
  }
  .circle-3 {
    content: ''; position: absolute;
    width: 180px; height: 180px;
    background: rgba(158,0,255,0.2);
    border-radius: 50%; top: 50px; left: 350px;
  }
  .left { position: relative; z-index: 2; color: #fff; max-width: 440px; }
  .left .emoji { font-size: 56px; margin-bottom: 10px; }
  .left h1 { font-size: 48px; font-weight: 900; line-height: 1.15; margin-bottom: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .left h1 span { color: #FF6B35; }
  .left p { font-size: 18px; color: rgba(255,255,255,0.8); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.5; }
  .tags { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .tag {
    background: rgba(255,255,255,0.12); color: #fff;
    padding: 7px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .tag.highlight { background: #FF6B35; color: #fff; }
  .right { position: relative; z-index: 2; text-align: center; }
  .right .logo-circle {
    width: 200px; height: 200px; border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    overflow: hidden;
  }
  .right .logo-circle img { width: 130px; height: 130px; object-fit: contain; }
  .right .app-name {
    display: inline-block; margin-top: 16px;
    background: rgba(255,255,255,0.12); color: #fff;
    padding: 10px 28px; border-radius: 24px;
    font-size: 20px; font-weight: 900;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: 1px;
  }
  .footer-text {
    position: absolute; bottom: 16px; right: 60px; z-index: 2;
    color: rgba(255,255,255,0.5); font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  /* Partículas decorativas */
  .dot {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.1); z-index: 1;
  }
  .dot-1 { width: 8px; height: 8px; top: 80px; left: 520px; }
  .dot-2 { width: 12px; height: 12px; top: 160px; left: 680px; }
  .dot-3 { width: 6px; height: 6px; top: 380px; left: 480px; }
</style>
</head>
<body>

<div class="graphic">
  <div class="circle-3"></div>
  <div class="dot dot-1"></div>
  <div class="dot dot-2"></div>
  <div class="dot dot-3"></div>

  <div class="left">
    <div class="emoji">🛵🍕</div>
    <h1>Pide lo que<br><span>quieras</span></h1>
    <p>Delivery de restaurantes, supermercados,<br>farmacias y más. Directo a tu puerta.</p>
    <div class="tags">
      <span class="tag highlight">Delivery rápido</span>
      <span class="tag">GPS en vivo</span>
      <span class="tag">Múltiples pagos</span>
    </div>
  </div>
  <div class="right">
    <div class="logo-circle">
      <img src="assets/images/logo.png" alt="Go Deli" onerror="this.parentElement.innerHTML='<span style=font-size:72px>🛵</span>'">
    </div>
    <div class="app-name">GO DELI</div>
  </div>
  <div class="footer-text">www.godeli.cl</div>
</div>

</body>
</html>
