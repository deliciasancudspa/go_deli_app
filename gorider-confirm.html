<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correo confirmado — Go Rider</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#FF6B35,#7C3AED);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:24px;padding:48px 36px;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .icon{font-size:64px;margin-bottom:20px}
  h1{color:#1A1A2E;font-size:24px;margin-bottom:12px;font-weight:900}
  p{color:#6B7280;font-size:16px;line-height:1.6;margin-bottom:28px}
  .badge{display:inline-block;background:#10B981;color:#fff;padding:8px 20px;border-radius:20px;font-weight:700;font-size:14px;margin-bottom:24px}
  .app-link{display:inline-block;background:linear-gradient(135deg,#FF6B35,#7C3AED);color:#fff;padding:14px 32px;border-radius:14px;text-decoration:none;font-weight:800;font-size:15px;transition:transform 0.2s}
  .app-link:hover{transform:scale(1.03)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🛵</div>
  <div class="badge">✓ Correo confirmado</div>
  <h1>¡Todo listo, repartidor!</h1>
  <p>Tu correo fue confirmado exitosamente. Ahora abre la app <strong>Go Rider</strong> e inicia sesión para completar tu registro.</p>
  <p style="font-size:14px;color:#9CA3AF;margin-bottom:16px;">Si no tienes la app instalada, descárgala desde Google Play Store.</p>
</div>
</body>
</html>
