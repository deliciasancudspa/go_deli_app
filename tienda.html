<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Deli</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1A0033;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.15);border-top-color:#FF6B00;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:14px;opacity:0.7;}
.logo{font-size:32px;font-weight:900;margin-bottom:8px;}
.logo span{color:#FF6B00;}
</style>
</head>
<body>
<div class="logo">Go<span>Deli</span></div>
<div class="spinner"></div>
<p id="status">Buscando tienda...</p>
<script>
(function(){
  var SUPA_URL='https://yxseolcaububyifhksud.supabase.co';
  var SUPA_KEY='sb_publishable_wc8oyi80Iu2RPgJr-9zS4g_DJ3l-3nV';
  var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

  var qp = new URLSearchParams(window.location.search);
  var slug = qp.get('slug') || '';
  if (!slug) {
    slug = window.location.pathname.replace(/^\//,'').replace(/\/$/,'');
  }
  slug = slug.trim().toLowerCase();

  var statusEl = document.getElementById('status');

  if (!slug) {
    statusEl.textContent = 'Redirigiendo al inicio...';
    window.location.href = '/web';
    return;
  }

  statusEl.textContent = 'Buscando ' + slug + '...';

  sb.rpc('resolve_slug', { p_slug: slug }).then(function(res) {
    var storeId = res.data;
    var error = res.error;
    if (error) {
      statusEl.textContent = 'Error: ' + error.message;
      setTimeout(function(){ window.location.href = '/web'; }, 2000);
      return;
    }
    if (storeId) {
      statusEl.textContent = '¡Tienda encontrada! Abriendo...';
      window.location.href = '/web?store=' + storeId;
    } else {
      statusEl.textContent = 'Tienda no encontrada: ' + slug;
      setTimeout(function(){ window.location.href = '/web'; }, 2000);
    }
  }).catch(function(e) {
    statusEl.textContent = 'Error: ' + (e && e.message || e);
    setTimeout(function(){ window.location.href = '/web'; }, 2000);
  });
})();
</script>
</body>
</html>
