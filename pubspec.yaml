name: go_deli
description: Go Deli - App Cliente
publish_to: none
version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.8.0
  cupertino_icons: ^1.0.6
  shimmer: 3.0.0
  flutter_svg: ^2.0.9
  lottie: 3.0.0
  smooth_page_indicator: 1.1.0
  badges: ^3.1.2
  provider: 6.1.1
  go_router: 13.0.0
  # Firebase (opcional: comenta si no lo usas)
  shared_preferences: 2.2.2
  flutter_secure_storage: 9.0.0
  intl: 0.20.2
  connectivity_plus: ^6.0.0
  dio: 5.4.0
  equatable: 2.0.5
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  url_launcher: ^6.2.4
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  geocoding: ^3.0.0
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900

