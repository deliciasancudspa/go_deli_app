name: go_rider
description: Go Deli Rider - App para repartidores
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.3.0
  provider: ^6.1.1
  go_router: ^13.0.0
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  url_launcher: ^6.2.4
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
