name: go_rider
description: Go Deli Rider - App para repartidores
publish_to: none
version: 1.0.1+5

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.8.0
  provider: ^6.1.1
  go_router: ^13.0.0
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  url_launcher: ^6.2.4
  audioplayers: ^6.1.0
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
